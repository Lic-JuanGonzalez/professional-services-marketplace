services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-marketplace_db}
      POSTGRES_USER: ${DB_USER:-marketplace_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-marketplace_pass}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - marketplace_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-marketplace_user} -d ${DB_NAME:-marketplace_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-marketplace_db}
      DB_USER: ${DB_USER:-marketplace_user}
      DB_PASSWORD: ${DB_PASSWORD:-marketplace_pass}
      JWT_SECRET: ${JWT_SECRET:-5A25482B4D6251655468576D5A7134743777217A25432A462D4A614E645267}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
    ports:
      - "${SERVER_PORT:-8082}:8082"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  marketplace_pgdata:
